codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "50...80"

  status:
    project:
      default:
        target: 70%
        threshold: 5%
        paths:
          - "core/"
          - "engine/"
          - "pkg/"
      core:
        target: 75%
        paths:
          - "core/"
      engine:
        target: 70%
        paths:
          - "engine/"
      pkg:
        target: 70%
        paths:
          - "pkg/"

    patch:
      default:
        target: 80%
        threshold: 5%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

flags:
  unittests:
    paths:
      - core/
      - engine/
      - pkg/
    carryforward: true
  integration:
    paths:
      - test/integration/
    carryforward: true
